<app-modal></app-modal>
<app-notification></app-notification>
<div class="flex flex-col min-h-screen">
  <app-navbar id="navbar"></app-navbar>
  <main class="flex-1 bg-white">
    <router-outlet></router-outlet>
    <app-chat-widget #chatWidgetComp></app-chat-widget>
  </main>
  <app-footer></app-footer>
  <!-- Botón flotante para ir al navbar -->
  <!-- Contenedor principal de los botones flotantes -->
  <div class="fixed bottom-8 right-8 group z-50">
    <!-- Botón de actualización de versión -->
    @if (showUpdateNotification()) {
      <button
        (click)="reloadApp()"
        class="w-12 h-12 mb-2 bg-white text-teal-600 border border-teal-600 rounded-full shadow-lg transition-all duration-300 flex items-center justify-center hover:scale-105"
        [title]="'common.updateAvailable' | transloco"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 rotate-animation"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          />
        </svg>
      </button>
    }

    <!-- Botón de scroll arriba -->
    <!-- 
    <button
      (click)="scrollToTop()"
      class="w-12 h-12 mb-2 bg-white text-teal-600 border border-teal-600 rounded-full p-2 shadow-lg transition-all duration-300 flex items-center justify-center hover:scale-105"
      [title]="'common.scrollTop' | transloco"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 arrow-bounce"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5 15l7-7 7 7"
        />
      </svg>
    </button>
-->
    <!-- Botón de contacto -->
    <button
      (click)="navigateToContact()"
      class="w-12 h-12 mb-2 bg-white text-teal-600 border border-teal-600 rounded-full p-2 shadow-lg transition-all duration-300 flex items-center justify-center hover:scale-105"
      [title]="'common.contact' | transloco"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="25"
        height="25"
        fill="currentColor"
        class="bi bi-chat-dots pulse-animation"
        viewBox="0 0 16 16"
      >
        <path
          d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0m4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0m3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2"
        />
        <path
          d="m2.165 15.803.02-.004c1.83-.363 2.948-.842 3.468-1.105A9 9 0 0 0 8 15c4.418 0 8-3.134 8-7s-3.582-7-8-7-8 3.134-8 7c0 1.76.743 3.37 1.97 4.6a10.4 10.4 0 0 1-.524 2.318l-.003.011a11 11 0 0 1-.244.637c-.079.186.074.394.273.362a22 22 0 0 0 .693-.125m.8-3.108a1 1 0 0 0-.287-.801C1.618 10.83 1 9.468 1 8c0-3.192 3.004-6 7-6s7 2.808 7 6-3.004 6-7 6a8 8 0 0 1-2.088-.272 1 1 0 0 0-.711.074c-.387.196-1.24.57-2.634.893a11 11 0 0 0 .398-2"
        />
      </svg>
    </button>

    <!-- Botón flotante de chat -->
    <div class="relative">
      <button
        (click)="toggleChat()"
        class="w-12 h-12 text-amber-800 bg-white border border-amber-800 rounded-full shadow-sm transition-all duration-300 hover:scale-105 hover:bg-amber-50 hover:shadow-md flex items-center justify-center relative z-10"
        [title]="
          isChatOpen ? ('chat.close' | transloco) : ('chat.open' | transloco)
        "
      >
        @if (!isChatOpen) {
          <!-- Icono de Robot -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="25"
            height="25"
            fill="currentColor"
            class="bi bi-robot"
            viewBox="0 0 16 16"
          >
            <path
              d="M6 12.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5M3 8.062C3 6.76 4.235 5.765 5.53 5.886a26.6 26.6 0 0 0 4.94 0C11.765 5.765 13 6.76 13 8.062v1.157a.93.93 0 0 1-.765.935c-.845.147-2.34.346-4.235.346s-3.39-.2-4.235-.346A.93.93 0 0 1 3 9.219zm4.542-.827a.25.25 0 0 0-.217.068l-.92.9a25 25 0 0 1-1.871-.183.25.25 0 0 0-.068.495c.55.076 1.232.149 2.02.193a.25.25 0 0 0 .189-.071l.754-.736.847 1.71a.25.25 0 0 0 .404.062l.932-.97a25 25 0 0 0 1.922-.188.25.25 0 0 0-.068-.495c-.538.074-1.207.145-1.98.189a.25.25 0 0 0-.166.076l-.754.785-.842-1.7a.25.25 0 0 0-.182-.135"
            />
            <path
              d="M8.5 1.866a1 1 0 1 0-1 0V3h-2A4.5 4.5 0 0 0 1 7.5V8a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1v1a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1v-.5A4.5 4.5 0 0 0 10.5 3h-2zM14 7.5V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.5A3.5 3.5 0 0 1 5.5 4h5A3.5 3.5 0 0 1 14 7.5"
            />
          </svg>
        } @else {
          <!-- Icono de Cerrar (X) -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        }
      </button>
      <!-- Anillo de pulso -->
      <span
        class="absolute inset-0 rounded-full border-2 border-amber-300 animate-ping-border opacity-75 pointer-events-none"
      ></span>
    </div>
  </div>

  <style>
    @keyframes bounce {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }
    .arrow-bounce {
      animation: bounce 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }
    .pulse-animation {
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(-360deg);
      }
    }
    .rotate-animation {
      animation: rotate 2s linear infinite;
    }

    @keyframes colorPulse {
      0%,
      100% {
        color: #0d9488;
      }
      50% {
        color: #14b8a6;
      }
    }
    .color-pulse {
      animation: colorPulse 1.5s ease-in-out infinite;
    }

    @keyframes pingBorder {
      0% {
        transform: scale(1);
        opacity: 0.75;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.3;
      }
      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }
    .animate-ping-border {
      animation: pingBorder 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
  </style>
</div>
