<div class="calcom-container">
  @if (shouldShowLoading()) {
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <p class="loading-text">{{ "calendar.loading" | transloco }}</p>
    </div>
  }
  @if (shouldShowError()) {
    <div class="error-container">
      <div class="error-icon">⚠️</div>
      <p class="error-text">{{ errorMessage() }}</p>
      <button (click)="retry()" class="retry-button">
        {{ "calendar.retry" | transloco }}
      </button>
      @if (calUrl()) {
        <a
          [href]="'https://cal.com/' + calUrl()"
          target="_blank"
          class="external-link"
        >
          {{ "calendar.directUrl" | transloco }}
        </a>
      }
    </div>
  }

  <div
    #calContainer
    [id]="containerId()"
    class="cal-embed"
    [style.display]="shouldShowCalendar() ? 'block' : 'none'"
  ></div>
</div>

<style>
  .calcom-container {
    width: 100%;
    min-height: 600px;
    max-height: 700px;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .loading-container,
  .error-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 600px;
    width: 100%;
    padding: 2rem;
    text-align: center;
    position: absolute;
    top: 0;
    left: 0;
  }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 4px solid rgba(59, 130, 246, 0.1);
    border-left-color: #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loading-text {
    margin-top: 1rem;
    color: #6b7280;
    font-size: 0.875rem;
  }

  .error-container {
    background-color: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 0.5rem;
    gap: 1rem;
  }

  .error-icon {
    font-size: 3rem;
  }

  .error-text {
    color: #991b1b;
    font-size: 0.875rem;
    max-width: 400px;
  }

  .retry-button,
  .external-link {
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    text-decoration: none;
    font-size: 0.875rem;
    transition: background-color 0.2s;
    cursor: pointer;
    border: none;
  }

  .retry-button {
    background-color: #3b82f6;
    color: white;
  }

  .retry-button:hover {
    background-color: #2563eb;
  }

  .external-link {
    background-color: transparent;
    color: #3b82f6;
    border: 1px solid #3b82f6;
  }

  .external-link:hover {
    background-color: #eff6ff;
  }

  .cal-embed {
    width: 100%;
    height: 600px;
    overflow: auto;
    border: none;
  }

  /* Prevenir scrolls laterales */
  :host ::ng-deep .cal-embed iframe {
    border: none;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* Estilo para el contenedor de Cal.com */
  :host ::ng-deep .cal-embed [data-cal-namespace] {
    overflow: hidden !important;
  }
</style>
