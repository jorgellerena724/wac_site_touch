@if (visible()) {
  <div
    class="fixed inset-0 bg-slate-900 bg-opacity-75 flex items-center justify-center z-[60] backdrop-blur-sm px-2 sm:px-4"
    (click)="closeModal()"
  >
    <div
      [ngClass]="[getModalSizeClass(), getModalHeightClass()]"
      class="bg-white rounded-xl sm:rounded-2xl shadow-2xl custom-scrollbar overflow-y-auto border border-amber-300"
      (click)="$event.stopPropagation()"
    >
      <div
        class="px-4 sm:px-6 py-3 sm:py-4 bg-teal-600 flex justify-between items-center rounded-t-xl sm:rounded-t-2xl sticky top-0 z-10"
      >
        <h3
          class="text-sm sm:text-base md:text-lg text-white font-bold drop-shadow-sm"
        >
          {{ title() }}
        </h3>
        <button
          (click)="closeModal()"
          class="text-white hover:text-teal-50 transition-colors duration-200 p-1 rounded-full hover:bg-white/20 flex-shrink-0 ml-2"
        >
          <svg
            class="h-5 w-5 sm:h-6 sm:w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <div class="p-2 sm:p-4">
        <div
          class="custom-scroll"
          [style.max-height]="getContentMaxHeight()"
          style="overflow-y: auto"
        >
          <div class="flex flex-col space-y-6">
            <ng-container #dynamicContent></ng-container>
          </div>
        </div>
      </div>
      @if (currentConfig()?.showButtons !== false) {
        <div
          class="px-4 sm:px-6 py-3 sm:py-4 bg-orange-50 border-t border-orange-50/50 rounded-b-xl sm:rounded-b-2xl"
        >
          <div class="flex justify-end gap-4 mt-1">
            <button
              (click)="closeModal()"
              [disabled]="isProcessing()"
              class="w-full p-2 text-white bg-amber-300 rounded-lg hover:bg-orange-400 disabled:opacity-50"
            >
              {{ "modal.buttons.cancel" | transloco }}
            </button>
            <button
              (click)="onAccept()"
              [disabled]="isProcessing()"
              class="w-full p-2 text-white bg-orange-400 rounded-lg hover:bg-orange-500 flex items-center justify-center disabled:opacity-50"
            >
              @if (!isLoading()) {
                <span>{{ "modal.buttons.acept" | transloco }}</span>
              }
              @if (isLoading()) {
                <div class="flex items-center">
                  <svg
                    class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
                    fill="none"
                    viewBox="0 0 24 24"
                  >
                    <circle
                      class="opacity-25"
                      cx="12"
                      cy="12"
                      r="10"
                      stroke="currentColor"
                      stroke-width="4"
                    ></circle>
                    <path
                      class="opacity-75"
                      fill="currentColor"
                      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                    ></path>
                  </svg>
                  {{ "modal.buttons.acept" | transloco }}
                </div>
              }
            </button>
          </div>
        </div>
      }
    </div>
  </div>
}
<style>
  .custom-scroll::-webkit-scrollbar {
    width: 8px;
  }
  .custom-scroll::-webkit-scrollbar-track {
    background-color: #9ca3af;
  }
  .custom-scroll::-webkit-scrollbar-thumb {
    background-color: #9ca3af;
    border-radius: 10px;
    border: 2px solid #f1f1f1;
  }
  .custom-scroll::-webkit-scrollbar-thumb:hover {
    background-color: #9ca3af;
  }
  /* Para Firefox */
  .custom-scroll {
    scrollbar-width: thin;
    background-color: #9ca3af #f1f1f1;
  }
</style>
